<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#C8102E"/>
  <!-- Lotus: original paths in 20×20 space, scaled 1.6× and centered on 32×32 canvas -->
  <!-- scale(1.6) then translate so (10,10) maps to (16,16): translate = 16 - 10*1.6 = 0 -->
  <g transform="translate(0,0) scale(1.6)">
    <path d="M10 16 C10 16 4 11 4 7 C4 4.8 6 3 8 4 C8.8 4.4 9.4 5 10 6 C10.6 5 11.2 4.4 12 4 C14 3 16 4.8 16 7 C16 11 10 16 10 16Z" stroke="#DEC07F" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
    <path d="M10 16 L10 9" stroke="#DEC07F" stroke-width="1.1" stroke-linecap="round"/>
  </g>
</svg>
