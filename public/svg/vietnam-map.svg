  <defs>
    <style>
      .province {
        fill: #c8e6c9;
        stroke: #ffffff;
        stroke-width: 1.5;
        cursor: not-allowed;
        opacity: 0.5;
        transition: fill 0.2s, opacity 0.2s;
      }
      .province--active {
        fill: #4caf50;
        cursor: pointer;
        opacity: 1;
      }
      .province--active:hover {
        fill: #da251d;
        opacity: 1;
      }
      .province--disabled {
        fill: #c8e6c9;
        cursor: not-allowed;
        opacity: 0.45;
      }
      .province-label {
        font-family: sans-serif;
        font-size: 10px;
        fill: #333;
        pointer-events: none;
        text-anchor: middle;
      }
      .ocean {
        fill: #bbdefb;
      }
    </style>
  </defs>

