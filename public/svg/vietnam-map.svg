<!--
  Bản đồ Việt Nam — Phiên bản MVP
  ⚠️  QUAN TRỌNG: Đây là bản đồ SVG đơn giản hóa cho mục đích phát triển MVP.
  ⚠️  TRƯỚC KHI PUBLISH PRODUCTION: Cần kiểm tra kỹ đường biên giới:
      1. Đối chiếu với bản đồ chính thức của Bộ TN&MT Việt Nam
      2. Đảm bảo TUYỆT ĐỐI KHÔNG có đường lưỡi bò
      3. Kiểm tra đường biên giới Việt — Trung, Việt — Lào, Việt — Campuchia
      4. Xác nhận quần đảo Hoàng Sa và Trường Sa thuộc chủ quyền Việt Nam
  TODO: Replace with verified official boundary data before production deployment
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
